name: CI-CD GitOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  build-and-deploy:
    name: Build and Deploy to DEV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Set Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker Images
        run: |
          docker build -t $ACR_LOGIN_SERVER/user-service:$IMAGE_TAG ./services/user-service
          docker build -t $ACR_LOGIN_SERVER/order-service:$IMAGE_TAG ./services/order-service

      - name: Push Docker Images
        run: |
          docker push $ACR_LOGIN_SERVER/user-service:$IMAGE_TAG
          docker push $ACR_LOGIN_SERVER/order-service:$IMAGE_TAG

      - name: Clone GitOps Repository
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ secrets.GITOPS_REPO }}.git gitops-deployments

      - name: Update DEV Manifests
        run: |
          cd gitops-deployments/dev
          sed -i "s|$ACR_LOGIN_SERVER/user-service:.*|$ACR_LOGIN_SERVER/user-service:$IMAGE_TAG|g" user-service.yaml
          sed -i "s|$ACR_LOGIN_SERVER/user-service:.*|$ACR_LOGIN_SERVER/user-service:$IMAGE_TAG|g" user-service-canary.yaml
          sed -i "s|$ACR_LOGIN_SERVER/order-service:.*|$ACR_LOGIN_SERVER/order-service:$IMAGE_TAG|g" order-service.yaml

      - name: Commit and Push DEV Changes
        run: |
          cd gitops-deployments
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "CI: update DEV images to $IMAGE_TAG" || echo "No changes"
          git push

  deploy-prod:
    name: Promote to PROD (Manual Approval)
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Clone GitOps Repository
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ secrets.GITOPS_REPO }}.git gitops-deployments

      - name: Update PROD Manifests
        run: |
          cd gitops-deployments/prod
          sed -i "s|$ACR_LOGIN_SERVER/user-service:.*|$ACR_LOGIN_SERVER/user-service:$IMAGE_TAG|g" user-service.yaml
          sed -i "s|$ACR_LOGIN_SERVER/user-service:.*|$ACR_LOGIN_SERVER/user-service:$IMAGE_TAG|g" user-service-canary.yaml
          sed -i "s|$ACR_LOGIN_SERVER/order-service:.*|$ACR_LOGIN_SERVER/order-service:$IMAGE_TAG|g" order-service.yaml

      - name: Commit and Push PROD Changes
        run: |
          cd gitops-deployments
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Promote to PROD $IMAGE_TAG" || echo "No changes"
          git push