name: CI-CD GitOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint . -d '
          extends: relaxed
          rules:
            line-length: disable
          '

      - name: Run hadolint (user-service)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./services/user-service/Dockerfile

      - name: Run hadolint (order-service)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./services/order-service/Dockerfile

  build-and-deploy:
    name: Build and Push Images
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Set Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ FIXED: Build + push directly (no manual docker push needed)
      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/user-service:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/order-service
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/order-service:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get ACR token for Trivy
        id: acr-token
        run: |
          TOKEN=$(az acr login --name $ACR_NAME --expose-token --output tsv --query accessToken)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Scan user-service image with Trivy
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/user-service:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
        env:
          TRIVY_USERNAME: 00000000-0000-0000-0000-000000000000
          TRIVY_PASSWORD: ${{ steps.acr-token.outputs.token }}

      - name: Scan order-service image with Trivy
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/order-service:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
        env:
          TRIVY_USERNAME: 00000000-0000-0000-0000-000000000000
          TRIVY_PASSWORD: ${{ steps.acr-token.outputs.token }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign Docker images
        run: |
          cosign sign --yes $ACR_LOGIN_SERVER/user-service:$IMAGE_TAG
          cosign sign --yes $ACR_LOGIN_SERVER/order-service:$IMAGE_TAG

  smoke-tests:
    name: Run Smoke Tests on DEV
    needs: build-and-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          K6_VERSION="v0.57.0"
          curl -Lo /tmp/k6.tar.gz \
            "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/k6.tar.gz -C /tmp
          sudo mv /tmp/k6-${K6_VERSION}-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      - name: Run k6 smoke test
        run: k6 run tests/smoke.js
        env:

          TARGET_URL: "http://4.188.101.151"
